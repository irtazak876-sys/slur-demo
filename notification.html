<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE — Real-Time Signal Ecosystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --bg-dark: #020203;
  --surface: rgba(15, 15, 24, 0.7);
  --surface-hover: rgba(25, 25, 38, 0.8);
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent: #8b5cf6;
  --accent-glow: rgba(139, 92, 246, 0.3);
  --ok: #10b981;
  --info: #0ea5e9;
  --warn: #f59e0b;
  --danger: #ef4444;
  --txt-main: #f8fafc;
  --txt-dim: #94a3b8;
  --txt-muted: #475569;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-lg: 16px;
  --radius-md: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg-dark); font-family: 'Outfit', sans-serif; color: var(--txt-main); }

body {
  background: 
    radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
    var(--bg);
  opacity: 0;
  transition: opacity 0.5s;
}

.app { display: grid; grid-template-rows: 72px 1fr; height: 100vh; }

.header {
  display: flex; align-items: center; padding: 0 32px;
  background: rgba(5, 5, 8, 0.8); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--glass-border);
}

.brand { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.brand-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 3px; box-shadow: 0 0 15px var(--accent); }

.main { display: grid; grid-template-columns: 320px 1fr 380px; overflow: hidden; }

.panel { display: flex; flex-direction: column; background: var(--surface); backdrop-filter: blur(8px); border-right: 1px solid var(--glass-border); }
.panel-head { padding: 24px; border-bottom: 1px solid var(--glass-border); }
.panel-label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
.panel-title { font-size: 18px; font-weight: 700; margin-top: 4px; }
.panel-body { flex: 1; overflow-y: auto; padding: 24px; }

/* FEED */
.feed { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--surface); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 16px 20px;
  display: flex; gap: 16px; position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideIn 0.4s ease-out;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
.card.ok::before { background: var(--ok); }
.card.info::before { background: var(--info); }
.card.warn::before { background: var(--warn); }
.card.danger::before { background: var(--danger); }
.card.read { opacity: 0.5; }

.card-icon { width: 48px; height: 48px; background: var(--glass); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.card-content { flex: 1; }
.card-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.card-title { font-size: 15px; font-weight: 700; }
.card-time { font-family: var(--font-mono); font-size: 11px; color: var(--txt-muted); }
.card-msg { font-size: 13px; color: var(--txt-dim); margin-bottom: 10px; }
.card-btns { display: flex; gap: 8px; }

.btn-pill { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--txt-dim); cursor: pointer; transition: all 0.2s; }
.btn-pill:hover { border-color: var(--accent); color: var(--accent); }

/* PRODUCER */
.evt-card {
  width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 12px 16px;
  display: flex; align-items: center; gap: 12px; cursor: pointer; color: inherit; font: inherit; text-align: left; margin-bottom: 8px; transition: all 0.2s;
}
.evt-card:hover { transform: translateY(-2px); border-color: var(--accent); background: var(--surface-hover); }
.evt-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

/* STATS */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.stat-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 20px; }
.stat-val { font-size: 32px; font-weight: 800; }

.log { background: #000; border-radius: 8px; padding: 16px; height: 180px; overflow-y: auto; font-family: var(--font-mono); font-size: 11px; }
.log-line { display: flex; gap: 10px; margin-bottom: 4px; opacity: 0.7; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="brand"><div class="brand-dot"></div>PULSE</div>
    <div style="margin-left:auto; display:flex; gap:24px; align-items:center;">
      <div id="conn-pill" style="font-size:12px; font-weight:600; color:var(--ok);">● CONNECTED</div>
      <button class="btn-pill" id="soundToggle">🔊 Audio</button>
    </div>
  </header>

  <main class="main">
    <aside class="panel">
      <div class="panel-head"><div class="panel-label">Control</div><div class="panel-title">Producer</div></div>
      <div class="panel-body">
        <button class="evt-card" data-type="ok" data-event="order.shipped">
          <div class="evt-icon" style="background:rgba(16,185,129,0.1); color:var(--ok);">📦</div>
          <div><div style="font-size:13px; font-weight:600;">Order Shipped</div><div style="font-size:10px; color:var(--txt-muted);">order.shipped</div></div>
        </button>
        <button class="evt-card" data-type="danger" data-event="payment.failed">
          <div class="evt-icon" style="background:rgba(239,68,68,0.1); color:var(--danger);">❌</div>
          <div><div style="font-size:13px; font-weight:600;">Payment Failed</div><div style="font-size:10px; color:var(--txt-muted);">payment.failed</div></div>
        </button>
        <div style="margin-top:24px;">
          <input type="text" id="custom-title" placeholder="Custom Event Name" style="width:100%; background:var(--glass); border:1px solid var(--glass-border); padding:10px; border-radius:8px; color:white; margin-bottom:8px; outline:none;">
          <button id="btn-custom" style="width:100%; background:var(--accent); border:none; padding:12px; border-radius:8px; color:white; font-weight:700; cursor:pointer;">Emit Custom</button>
        </div>
      </div>
    </aside>

    <section class="panel" style="border-right:1px solid var(--glass-border);">
      <div class="panel-head"><div class="panel-label">Signals</div><div class="panel-title">Live Stream</div></div>
      <div class="feed" id="feed"></div>
    </section>

    <aside class="panel">
      <div class="panel-head"><div class="panel-label">Metrics</div><div class="panel-title">Analytics</div></div>
      <div class="panel-body">
        <div class="stats">
          <div class="stat-box"><div style="font-size:10px; color:var(--txt-muted);">TOTAL</div><div class="stat-val" id="stat-total">0</div></div>
          <div class="stat-box"><div style="font-size:10px; color:var(--txt-muted);">UNREAD</div><div class="stat-val" id="stat-unread">0</div></div>
        </div>
        <div class="log" id="log-stream"></div>
      </div>
    </aside>
  </main>
</div>

<script>
class Dashboard {
  constructor() {
    this.notifications = [];
    this.ws = null;
    this.init();
  }

  init() {
    const host = window.location.host || 'localhost:4000';
    this.ws = new WebSocket(`ws://${host}`);
    this.ws.onopen = () => console.log('Link active');
    this.ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if(data.type === 'snapshot') this.notifications = data.notifications;
      if(data.type === 'new_notification') this.notifications.unshift(data.notif);
      this.render();
    };

    document.querySelectorAll('.evt-card').forEach(b => b.onclick = () => this.emit(b.dataset.type, b.dataset.event, b.innerText));
    document.getElementById('btn-custom').onclick = () => this.emit('info', 'custom', document.getElementById('custom-title').value);
    
    document.body.style.opacity = '1';
  }

  emit(type, event, title) {
    const host = window.location.host || 'localhost:4000';
    fetch(`http://${host}/api/emit`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type, event, title: title.split('\n')[0], message: 'System signal received.' })
    });
  }

  render() {
    document.getElementById('feed').innerHTML = this.notifications.map(n => `
      <div class="card ${n.type} ${n.read?'read':''}">
        <div class="card-icon">${n.type==='ok'?'✨':n.type==='danger'?'⚡':'🔹'}</div>
        <div class="card-content">
          <div class="card-top"><span class="card-title">${n.title}</span><span class="card-time">now</span></div>
          <div class="card-msg">${n.message}</div>
          <div class="card-btns">
            ${!n.read?`<button class="btn-pill" onclick="window._d.read('${n.id}')">Read</button>`:''}
            <button class="btn-pill" onclick="window._d.del('${n.id}')">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
    document.getElementById('stat-total').innerText = this.notifications.length;
    document.getElementById('stat-unread').innerText = this.notifications.filter(n=>!n.read).length;
  }

  read(id) { fetch(`http://localhost:4000/api/notifications/${id}/read`, {method:'PATCH'}); }
  del(id) { fetch(`http://localhost:4000/api/notifications/${id}`, {method:'DELETE'}); }
}
window._d = new Dashboard();
</script>
</body>
</html>
